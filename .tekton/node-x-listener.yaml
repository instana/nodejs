apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: node-x-binding
spec:
  envFrom:
    - configMapRef:
        name: environment-properties
  params:
    - name: branch
      value: $(params.target_branch)
    - name: target-branch
      value: $(params.target_branch)
    - name: type
      value: "nightly"
    - name: repository
      value: $(params.repository_url)
    - name: commit-id
      value: ""
    - name: node-version
      value: $(params.node_version)
    - name: pl-name
      value: "nightly-$(params.node_version)"      

---

apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: node-x-listener
spec:
  triggers:
    - bindings:
        - name: node-x-binding
      template:
        name: custom-template